name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: [ '3.11', '3.12', '3.13', '3.14' ]
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Display Python version
        run: python --version

      - name: Install poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: '2.2.1'

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'videohashes/go.mod'
          cache-dependency-path: 'videohashes/go.sum'

      - name: Install ffmpeg
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
              sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
          elif [ "$RUNNER_OS" == "Windows" ]; then
              choco install -q -y ffmpeg
          elif [ "$RUNNER_OS" == "macOS" ]; then
              env HOMEBREW_NO_AUTO_UPDATE=1 brew install ffmpeg
          fi
        shell: bash

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: '24'

      - name: Install Poetry Dependencies
        run: poetry install

      - name: Approve builds
        run: pnpm approve-builds

      - name: Build All
        run: poetry run poe build_all

  coverage:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Display Python version
        run: python --version

      - name: Install Go
        uses: actions/setup-go@v6
        with:
          go-version-file: 'videohashes/go.mod'
          cache-dependency-path: 'videohashes/go.sum'

      - name: Install ffmpeg
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
              sudo apt-get update && sudo apt-get install -y --no-install-recommends ffmpeg
          elif [ "$RUNNER_OS" == "Windows" ]; then
              choco install -q -y ffmpeg
          elif [ "$RUNNER_OS" == "macOS" ]; then
              env HOMEBREW_NO_AUTO_UPDATE=1 brew install ffmpeg
          fi
        shell: bash

      - name: Install poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: '2.2.1'

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Install Node
        uses: actions/setup-node@v6
        with:
          cache: 'pnpm'
          node-version: '24'

      - name: Install Poetry Dependencies
        run: poetry install

      - name: Build All
        run: poetry run poe build_all

      - name: Run tests
        run: poetry run pytest --cov

      - name: Run coverage
        run: poetry run coverage xml

      - uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          name: unittest
          fail_ci_if_error: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}

  dockerbuild:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true

      - run: ./docker_build.sh

  auto-tag:
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main'}}
    needs:
      - dockerbuild
      - build
    outputs:
      created-tag: ${{ steps.auto-tag.outputs.tag }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'

      - name: Display Python version
        run: python --version

      - name: install poetry
        uses: abatilo/actions-poetry@v4
        with:
          poetry-version: '2.2.1'

      - name: Create tag from pyproject version if missing
        id: auto-tag
        run: |
          version="v$(poetry version -s)"
          if git ls-remote --exit-code --tags origin "refs/tags/${version}" >/dev/null 2>&1; then
            echo "Tag ${version} already exists, skipping."
            echo "tag=" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${version}"
          git push origin "${version}"
          echo "tag=${version}" >> "$GITHUB_OUTPUT"

  project-release:
    needs:
      - auto-tag
    if: ${{ needs.auto-tag.outputs.created-tag != '' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.auto-tag.outputs.created-tag }}
          generate_release_notes: true


  docker-release:
    needs:
      - auto-tag
    if: ${{ needs.auto-tag.outputs.created-tag != '' }}
    permissions:
      packages: write
      contents: read
    runs-on: ubuntu-latest
    steps:
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: true

      - name: build and tag
        run: |
          export BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')
          export GIT_HASH=$(git rev-parse --verify HEAD)
          export repo=blackibanez
          export version=$( echo "${{ needs.auto-tag.outputs.created-tag }}" | grep -e '[0-9.]*')
          docker build . --build-arg "BUILD_DATE=${BUILD_DATE}" --build-arg "GIT_HASH=${GIT_HASH}" --build-arg "PROJECT_VERSION=${version}" -t "ghcr.io/${repo}/namer:${version}" -t "ghcr.io/${repo}/namer:latest"
          docker push "ghcr.io/${repo}/namer:${version}"
          docker push "ghcr.io/${repo}/namer:latest"
